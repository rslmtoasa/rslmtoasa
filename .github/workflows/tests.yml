name: Example tests

# Triggered automatically after the build workflow completes successfully.
# Can also be triggered manually by providing a build workflow run ID.
on:
  workflow_run:
    workflows: ["Build binaries on all platforms (beta)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the build workflow to pull binaries from"
        required: true
      ref:
        description: "Git ref/SHA to test (defaults to triggering run head SHA when empty)"
        required: false

jobs:
  test:
    name: Test on ${{ matrix.os }} ${{ matrix.icon }}

    # For workflow_run: only proceed if the build succeeded.
    # For workflow_dispatch: always run (user chose the run ID explicitly).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    strategy:
      fail-fast: false
      matrix:
        include:
          - { icon: "🐧", os: ubuntu-latest, arch: x86_64 }
          - { icon: "🍎", os: macos-14,      arch: arm64  }
          # macos-13 (x86_64 Intel) has been retired by GitHub
          # - { icon: "🍏", os: macos-13,      arch: x86_64 }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_run: pin to the exact commit that triggered the build workflow.
          # workflow_dispatch: allow overriding via input.ref; if empty, use run head SHA.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

      # -----------------------------------------------------------------------
      # System dependencies — mirrors the build workflow so cmake can configure
      # -----------------------------------------------------------------------
      - name: Install system dependencies (Linux) ${{ matrix.icon }}
        if: runner.os == 'Linux'
        run: |
          sudo apt-get -y install \
            ninja-build cmake \
            gfortran \
            libopenblas-dev liblapack-dev \
            openmpi-bin openmpi-common libopenmpi-dev

      - name: Install system dependencies (macOS) ${{ matrix.icon }}
        if: runner.os == 'macOS'
        run: |
          for pkg in ninja cmake open-mpi; do
            if ! brew list --versions "$pkg" >/dev/null 2>&1; then
              brew install "$pkg"
            fi
          done
          gfc=$(ls "$(brew --prefix)/bin/gfortran-"* 2>/dev/null | sort -V | tail -1)
          sudo ln -sf "$gfc" "$(brew --prefix)/bin/gfortran"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # Python — needs f90nml for run_test.py
      # -----------------------------------------------------------------------
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install f90nml

      # -----------------------------------------------------------------------
      # Download pre-built binary from the build workflow
      # -----------------------------------------------------------------------
      - name: Resolve build workflow run ID
        id: run_id
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          fi

      - name: Show workflow provenance
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "dispatch.run_id=${{ inputs.run_id || 'n/a' }}"
          echo "dispatch.ref=${{ inputs.ref || 'n/a' }}"
          echo "workflow_run.id=${{ github.event.workflow_run.id || 'n/a' }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha || 'n/a' }}"
          echo "selected.run_id=${{ steps.run_id.outputs.id }}"
          echo "checked_out_sha=$(git rev-parse HEAD)"
          echo "checked_out_branch=$(git branch --show-current || true)"
          echo "run_test_marker=$(grep -n "\[run_test\]" tests/run_test.py | head -n 1 || true)"

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rslmto.${{ runner.os }}.${{ matrix.arch }}
          path: dist/
          run-id: ${{ steps.run_id.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Configure CMake (registers tests; no build step needed)
      # -----------------------------------------------------------------------
      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DENABLE_MPI=ON \
            -DRUN_EXAMPLE_TESTS=ON \
            -DEXAMPLE_PYTHON_EXECUTABLE="$(which python3)"

      - name: Select MPI launcher
        run: |
          if command -v mpirun.openmpi >/dev/null 2>&1; then
            echo "RSLMTO_MPI_LAUNCHER=mpirun.openmpi" >> "$GITHUB_ENV"
          else
            echo "RSLMTO_MPI_LAUNCHER=mpirun" >> "$GITHUB_ENV"
          fi

      - name: Verify MPI runtime
        run: |
          if command -v "$RSLMTO_MPI_LAUNCHER" >/dev/null 2>&1; then
            echo "Using MPI launcher: $RSLMTO_MPI_LAUNCHER"
            "$RSLMTO_MPI_LAUNCHER" --version || true
          elif command -v mpiexec >/dev/null 2>&1; then
            echo "RSLMTO_MPI_LAUNCHER=mpiexec" >> "$GITHUB_ENV"
            echo "Fallback MPI launcher: mpiexec"
            mpiexec --version || true
          else
            echo "ERROR: no MPI launcher found (mpirun/mpiexec)"
            exit 1
          fi

      # Place the pre-built binary where CMake expects it
      - name: Stage pre-built binary
        run: |
          mkdir -p build/bin
          cp dist/rslmto.* build/bin/rslmto.x
          chmod +x build/bin/rslmto.x

      # -----------------------------------------------------------------------
      # Run tests
      # -----------------------------------------------------------------------
      - name: Run example tests ${{ matrix.icon }}
        id: ctest
        run: |
          ctest --test-dir build \
            --label-regex example \
            --output-on-failure \
            --output-junit "${{ github.workspace }}/results.xml" \
            --parallel 1 \
            -V 2>&1 | tee ctest_output.txt
          echo "ctest_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        # Always proceed to summary and upload steps even on failure
        continue-on-error: true

      - name: Dump per-case runner logs on failure
        if: steps.ctest.outputs.ctest_exit != '0'
        run: |
          echo "ctest failed; printing per-case testrun.log files"
          find build/Testing -type f -name testrun.log | sort | while read -r f; do
            echo "===== ${f} ====="
            tail -n 200 "$f" || true
            echo
          done

          if [ -f build/Testing/Temporary/LastTest.log ]; then
            echo "===== build/Testing/Temporary/LastTest.log (tail) ====="
            tail -n 300 build/Testing/Temporary/LastTest.log || true
          fi

      # -----------------------------------------------------------------------
      # GitHub step summary — parsed from JUnit XML
      # -----------------------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import os, xml.etree.ElementTree as ET

          xml_path = os.path.join(os.environ["GITHUB_WORKSPACE"], "results.xml")
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          if not os.path.exists(xml_path):
              with open(summary_path, "a") as f:
                  f.write("## Example tests\n\nNo results file found.\n")
              raise SystemExit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()
          suite = root.find("testsuite") or root

          passed, failed, skipped = [], [], []
          for tc in suite.findall("testcase"):
              name = tc.attrib.get("name", "?")
              time = float(tc.attrib.get("time", 0))
              label = f"`{name}` ({time:.1f}s)"
              if tc.find("failure") is not None or tc.find("error") is not None:
                  el = tc.find("failure") if tc.find("failure") is not None else tc.find("error")
                  msg = el.text or ""
                  failed.append((label, msg.strip()))
              elif tc.find("skipped") is not None:
                  skipped.append(label)
              else:
                  passed.append(label)

          total = len(passed) + len(failed) + len(skipped)
          status = "✅ All passed" if not failed else f"❌ {len(failed)} failed"

          lines = [
              f"## Example tests — {status}",
              "",
              f"**{len(passed)}/{total} passed**"
              + (f", {len(failed)} failed" if failed else "")
              + (f", {len(skipped)} skipped" if skipped else ""),
              "",
          ]

          if failed:
              lines += ["### ❌ Failed", "", "| Test | Output |", "|------|--------|"]
              for label, msg in failed:
                  # Truncate long messages for readability
                  short = msg.replace("\n", " ").replace("|", "\\|")[:200]
                  lines.append(f"| {label} | {short} |")
              lines.append("")

          if passed:
              lines += ["### ✅ Passed", "", "| Test |", "|------|"]
              lines += [f"| {t} |" for t in passed]
              lines.append("")

          with open(summary_path, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      # -----------------------------------------------------------------------
      # Upload artifacts for inspection
      # -----------------------------------------------------------------------
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test_logs.${{ runner.os }}.${{ matrix.arch }}
          path: |
            ctest_output.txt
            results.xml
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Propagate failure after summary and upload are done
      # -----------------------------------------------------------------------
      - name: Check test outcome
        if: steps.ctest.outputs.ctest_exit != '0'
        run: |
          echo "Tests failed — see summary above for details."
          exit 1
